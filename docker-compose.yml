services:
  postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: byke-postgres
    env_file:
      - backend/.env
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - byke-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: byke-redis
    env_file:
      - backend/.env
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - byke-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: byke-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms128m"
    depends_on:
      - zookeeper
    networks:
      - byke-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: byke-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_HEAP_OPTS: "-Xmx128m -Xms64m"
    ports:
      - "2181:2181"
    networks:
      - byke-network

  backend:
    build: backend
    container_name: byke-backend
    ports:
      - "8080:8080"
    env_file:
      - backend/.env
    volumes:
      - ./firebase-service-account.json:/opt/byke/firebase-service-account.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - byke-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    container_name: byke-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - byke-network

  grafana:
    image: grafana/grafana
    container_name: byke-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - byke-network

volumes:
  postgres_data:

networks:
  byke-network:
    driver: bridge
